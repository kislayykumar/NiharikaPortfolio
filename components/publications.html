<section class="section" id="publications" aria-labelledby="publications-heading">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Scholarly Work</span>
      <h2 class="section-title" id="publications-heading">Publications</h2>
      <p class="section-subtitle">Peer-reviewed contributions to science</p>
    </div>
    <div class="pub-controls">
      <div class="pub-search-wrapper">
        <i class="fas fa-search" aria-hidden="true"></i>
        <input type="search" id="pubSearch" class="pub-search"
               placeholder="Search publications…" aria-label="Search publications" />
      </div>
      <div class="pub-filter-btns" id="pubFilterBtns" role="group" aria-label="Filter by year"></div>
    </div>
    <div class="pub-list" id="pubList" role="list" aria-label="Publications list"></div>
    <p class="no-results" id="pubNoResults" hidden>No publications match your search.</p>
  </div>
</section>
