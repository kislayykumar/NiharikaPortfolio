<section class="section" id="about" aria-labelledby="about-heading">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Get to Know Me</span>
      <h2 class="section-title" id="about-heading">About Me</h2>
      <p class="section-subtitle">Researcher · Scientist · Mentor</p>
    </div>
    <div class="about-grid">
      <div class="about-text-col">
        <div class="about-bio" id="aboutBio"></div>
        <div class="about-vision-card card glass-card">
          <h3><i class="fas fa-eye" aria-hidden="true"></i> Research Vision</h3>
          <p id="aboutVision"></p>
        </div>
        <div class="about-philosophy-card card glass-card">
          <h3><i class="fas fa-lightbulb" aria-hidden="true"></i> Research Philosophy</h3>
          <p id="aboutPhilosophy"></p>
        </div>
      </div>
      <div class="about-aside-col">
        <div class="card glass-card about-current-card">
          <h3><i class="fas fa-flask" aria-hidden="true"></i> Current Work</h3>
          <p id="aboutCurrentWork"></p>
        </div>
        <div class="card glass-card about-objectives-card">
          <h3><i class="fas fa-bullseye" aria-hidden="true"></i> Research Objectives</h3>
          <ul class="objectives-list" id="aboutObjectives" role="list"></ul>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="stats-section" id="statistics" aria-label="Research statistics">
  <div class="container">
    <div class="stats-grid" id="statsGrid" role="list"></div>
  </div>
</section>
