<section class="section section-alt" id="achievements" aria-labelledby="achievements-heading">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Honours</span>
      <h2 class="section-title" id="achievements-heading">Awards &amp; Honours</h2>
      <p class="section-subtitle">Recognition for research excellence</p>
    </div>
    <div class="awards-layout">
      <div class="awards-timeline-col">
        <div class="timeline" id="awardsTimeline" role="list" aria-label="Awards timeline"></div>
      </div>
      <div class="achievements-list-col">
        <div class="achievements-highlights-card card glass-card">
          <div class="achievements-highlights-header">
            <div class="achievements-highlights-icon" aria-hidden="true">
              <i class="fas fa-star"></i>
            </div>
            <div>
              <h3 class="achievements-highlights-title">Achievement Highlights</h3>
              <p class="achievements-highlights-sub">Exams · Certifications · Education</p>
            </div>
          </div>
          <!-- Category filter pills -->
          <div class="achievements-filter-row" id="achievementsFilterRow" role="group" aria-label="Filter achievements"></div>
          <!-- Cards grid -->
          <div class="achievements-cards-grid" id="achievementsList" role="list"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="certifications" aria-labelledby="certifications-heading">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Credentials</span>
      <h2 class="section-title" id="certifications-heading">Certifications</h2>
      <p class="section-subtitle">Continuing education and professional development</p>
    </div>
    <div class="certifications-grid" id="certificationsGrid" role="list"></div>
  </div>
</section>

<section class="section" id="test-scores" aria-labelledby="test-scores-heading">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Competitive Exams</span>
      <h2 class="section-title" id="test-scores-heading">Test Scores</h2>
      <p class="section-subtitle">National-level qualifying examinations</p>
    </div>
    <div class="test-scores-grid" id="testScoresGrid" role="list"></div>
  </div>
</section>
