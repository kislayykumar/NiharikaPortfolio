<section class="hero" id="home" aria-label="Introduction">
  <canvas class="hero-canvas" id="heroCanvas" aria-hidden="true"></canvas>
  <div class="hero-floating-icons" id="heroFloatingIcons" aria-hidden="true"></div>

  <div class="hero-container">
    <div class="hero-image-col">
      <div class="hero-image-wrapper">
        <div class="hero-image-ring" aria-hidden="true"></div>
        <img class="hero-photo" id="heroPhoto" src="" alt="" loading="eager" />
        <div class="hero-status-badge">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="heroStatusText">Open to Collaborations</span>
        </div>
      </div>
    </div>

    <div class="hero-content-col">
      <div class="hero-greeting">Hello, I'm</div>
      <h1 class="hero-name" id="heroName">Loading…</h1>
      <div class="hero-typing-wrapper" aria-live="polite">
        <span class="hero-typing-prefix">I am a </span>
        <span class="hero-typing-text" id="heroTyping" aria-label="Current role"></span>
        <span class="hero-cursor" aria-hidden="true">|</span>
      </div>
      <p class="hero-institution" id="heroInstitution"></p>
      <p class="hero-department"  id="heroDepartment"></p>
      <div class="hero-research-focus" id="heroResearchFocus"></div>
      <div class="hero-buttons"       id="heroButtons"></div>
      <div class="hero-quick-stats"   id="heroQuickStats"></div>
    </div>
  </div>

  <div class="hero-scroll-indicator" aria-hidden="true">
    <span>Scroll Down</span>
    <div class="scroll-dot"></div>
  </div>
</section>
